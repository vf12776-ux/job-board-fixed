<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Доска заявок</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/icon-192.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            transition: background-color 0.2s, color 0.2s, border-color 0.2s;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            padding: 20px;
            min-height: 100vh;
        }

        /* светлая тема (по умолчанию) */
        :root {
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --border: #e5e7eb;
            --input-bg: #ffffff;
            --input-border: #d1d5db;
            --btn-primary: #3b82f6;
            --btn-primary-hover: #2563eb;
            --btn-danger: #ef4444;
            --btn-danger-hover: #dc2626;
            --btn-secondary: #9ca3af;
            --btn-secondary-hover: #6b7280;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }

        body.dark {
            --bg-body: #1f2937;
            --bg-card: #374151;
            --text-primary: #f9fafb;
            --text-secondary: #d1d5db;
            --border: #4b5563;
            --input-bg: #4b5563;
            --input-border: #6b7280;
            --btn-primary: #3b82f6;
            --btn-primary-hover: #60a5fa;
            --btn-danger: #f87171;
            --btn-danger-hover: #ef4444;
            --btn-secondary: #6b7280;
            --btn-secondary-hover: #4b5563;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.3);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 1.4rem;
            font-weight: 500;
            margin-bottom: 16px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            border: 1px solid var(--input-border);
            border-radius: 16px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--btn-primary);
            box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
        }

        button {
            background: var(--btn-primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            margin-right: 8px;
            margin-top: 8px;
        }

        button:hover {
            background: var(--btn-primary-hover);
            transform: scale(0.98);
        }

        .danger-btn {
            background: var(--btn-danger);
        }
        .danger-btn:hover {
            background: var(--btn-danger-hover);
        }

        .secondary-btn {
            background: var(--btn-secondary);
        }
        .secondary-btn:hover {
            background: var(--btn-secondary-hover);
        }

        .job {
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            background: var(--bg-card);
        }

        .job strong {
            font-size: 1.2rem;
        }

        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 8px 12px;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 100;
        }

        .error {
            color: #ef4444;
            font-size: 0.9rem;
            margin-top: 8px;
        }

        hr {
            margin: 16px 0;
            border-color: var(--border);
        }

        @media (max-width: 640px) {
            body { padding: 12px; }
            .card { padding: 16px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="theme-toggle" id="themeToggle" style="display: flex; align-items: center; gap: 6px;">🌙 Тема</div>
    <div class="container">
        <div class="card" id="app">
            <h1>📋 Доска заявок</h1>
            <div id="auth">
                <h2>Вход / Регистрация</h2>
                <input type="email" id="email" placeholder="Email" autocomplete="email">
                <input type="password" id="password" placeholder="Пароль" autocomplete="current-password">
                <select id="role">
                    <option value="candidate">👤 Кандидат</option>
                    <option value="employer">🏢 Работодатель</option>
                </select>
                <div>
                    <button onclick="register()">Регистрация</button>
                    <button onclick="login()" class="btn-primary">Вход</button>
                </div>
                <div id="authError" class="error"></div>
            </div>
            <div id="userInfo" style="display:none">
                <p>✅ Вы вошли как <strong><span id="userRole"></span></strong> (<span id="userEmail"></span>)</p>
                <button onclick="logout()" class="secondary-btn">Выйти</button>
                <hr>
                <div id="jobForm" style="display:none">
                    <h3>➕ Новая заявка</h3>
                    <input type="text" id="jobTitle" placeholder="Название вакансии">
                    <textarea id="jobDesc" rows="3" placeholder="Описание..."></textarea>
                    <button onclick="createJob()">Создать</button>
                </div>
                <h2>📌 Все заявки</h2>
                <div id="jobsList"></div>
            </div>
        </div>
    </div>

    <script>
        // Тема
        const themeToggle = document.getElementById('themeToggle');
        const root = document.documentElement;
        if (localStorage.getItem('theme') === 'dark') {
            root.classList.add('dark');
            themeToggle.innerText = '☀️';
        } else {
            themeToggle.innerText = '🌙';
        }
        themeToggle.onclick = () => {
            if (root.classList.contains('dark')) {
                root.classList.remove('dark');
                localStorage.setItem('theme', 'light');
                themeToggle.innerText = '🌙';
            } else {
                root.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                themeToggle.innerText = '☀️';
            }
        };

        let token = localStorage.getItem('token');
        let user = null;

        function showError(where, msg) {
            const el = document.getElementById(where);
            if (el) el.innerText = msg;
            setTimeout(() => { if(el) el.innerText = ''; }, 3000);
        }

        async function register() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, role })
            });
            if (res.ok) {
                showError('authError', '✅ Регистрация успешна, теперь войдите');
            } else {
                const err = await res.json();
                showError('authError', err.error || 'Ошибка');
            }
        }

        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            if (res.ok) {
                const data = await res.json();
                token = data.token;
                user = data.user;
                localStorage.setItem('token', token);
                document.getElementById('auth').style.display = 'none';
                document.getElementById('userInfo').style.display = 'block';
                document.getElementById('userEmail').innerText = user.email;
                document.getElementById('userRole').innerText = user.role === 'candidate' ? 'Кандидат' : (user.role === 'employer' ? 'Работодатель' : 'Администратор');
                if (user.role === 'employer' || user.role === 'admin') {
                    document.getElementById('jobForm').style.display = 'block';
                }
                loadJobs();
                if (user.role === 'admin') {
                    const adminDiv = document.createElement('div');
                    adminDiv.innerHTML = '<hr><a href="/admin" target="_blank" style="color: var(--btn-primary);">🛠️ Перейти в админ-панель</a>';
                    document.getElementById('userInfo').appendChild(adminDiv);
                }
            } else {
                const err = await res.json();
                showError('authError', err.error || 'Неверный логин или пароль');
            }
        }

        function logout() {
            localStorage.removeItem('token');
            token = null;
            user = null;
            document.getElementById('auth').style.display = 'block';
            document.getElementById('userInfo').style.display = 'none';
        }

        async function loadJobs() {
            const res = await fetch('/api/jobs');
            const jobs = await res.json();
            const container = document.getElementById('jobsList');
            container.innerHTML = '';
            if (jobs.length === 0) {
                container.innerHTML = '<p>Пока нет заявок</p>';
                return;
            }
            for (let job of jobs) {
                const div = document.createElement('div');
                div.className = 'job';
                div.innerHTML = `<strong>${escapeHtml(job.title)}</strong><br>${escapeHtml(job.description)}<br><small>📅 ${new Date(job.createdAt).toLocaleString()}</small>`;
                container.appendChild(div);
            }
        }

        async function createJob() {
            const title = document.getElementById('jobTitle').value.trim();
            const description = document.getElementById('jobDesc').value.trim();
            if (!title || !description) {
                alert('Заполните оба поля');
                return;
            }
            const res = await fetch('/api/jobs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ title, description })
            });
            if (res.ok) {
                document.getElementById('jobTitle').value = '';
                document.getElementById('jobDesc').value = '';
                loadJobs();
            } else {
                alert('Ошибка создания заявки');
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
                return c;
            });
        }

        if (token) {
            fetch('/api/jobs', { headers: { 'Authorization': `Bearer ${token}` } })
                .then(() => {
                    document.getElementById('auth').style.display = 'none';
                    document.getElementById('userInfo').style.display = 'block';
                    document.getElementById('userEmail').innerText = '...';
                    document.getElementById('userRole').innerText = '...';
                    loadJobs();
                })
                .catch(() => localStorage.removeItem('token'));
        }
    </script>
</body>
</html>
