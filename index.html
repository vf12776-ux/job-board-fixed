<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Доска заявок</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="/icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: background 0.2s, color 0.2s, border 0.2s; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            padding: 0;
            padding-bottom: 70px;
        }
        body.light {
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --text-primary: #111827;
            --text-secondary: #4b5563;
            --border: #e5e7eb;
            --input-bg: #ffffff;
            --input-border: #d1d5db;
            --btn-primary: #3b82f6;
            --btn-primary-hover: #2563eb;
            --btn-danger: #ef4444;
            --btn-success: #10b981;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1);
        }
        body.dark {
            --bg-body: #1f2937;
            --bg-card: #374151;
            --text-primary: #f9fafb;
            --text-secondary: #d1d5db;
            --border: #4b5563;
            --input-bg: #4b5563;
            --input-border: #6b7280;
            --btn-primary: #3b82f6;
            --btn-primary-hover: #60a5fa;
            --btn-danger: #f87171;
            --btn-success: #34d399;
            --shadow: 0 1px 3px 0 rgb(0 0 0 / 0.3);
        }
        .container { max-width: 800px; margin: 0 auto; padding: 16px; }
        .card {
            background: var(--bg-card);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }
        h1 { font-size: 1.6rem; margin-bottom: 8px; }
        h2 { font-size: 1.3rem; margin-bottom: 16px; }
        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            border: 1px solid var(--input-border);
            border-radius: 20px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
        }
        button {
            background: var(--btn-primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            margin: 4px 4px 0 0;
        }
        button:hover { background: var(--btn-primary-hover); transform: scale(0.98); }
        .job {
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            background: var(--bg-card);
        }
        .job strong { font-size: 1.2rem; display: block; margin-bottom: 6px; }
        .job-meta { font-size: 0.8rem; color: var(--text-secondary); margin: 8px 0; display: flex; gap: 12px; flex-wrap: wrap; }
        .theme-toggle {
            position: fixed;
            top: 12px;
            right: 12px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 40px;
            padding: 6px 12px;
            cursor: pointer;
            font-size: 0.8rem;
            z-index: 100;
            box-shadow: var(--shadow);
        }
        /* ========== НИЖНЕЕ МЕНЮ (Авито-стайл) ========== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            padding: 8px 0 12px;
            z-index: 200;
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 0.75rem;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 30px;
            transition: all 0.2s;
        }
        .nav-item span:first-child { font-size: 1.5rem; }
        .nav-item.active {
            color: #3b82f6;
            background: rgba(59,130,246,0.1);
            font-weight: 500;
        }
        .error { color: #ef4444; font-size: 0.8rem; margin-top: 8px; }
        hr { margin: 12px 0; border-color: var(--border); }
        .filter-bar {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .filter-bar select { flex: 1; margin: 0; }
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
        }
        .modal-content {
            background-color: var(--bg-card);
            margin: 15% auto;
            padding: 20px;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            max-height: 70%;
            display: flex;
            flex-direction: column;
        }
        .close {
            color: var(--text-secondary);
            float: right;
            font-size: 28px;
            cursor: pointer;
        }
        #chatMessages {
            flex-grow: 1;
            overflow-y: auto;
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 16px;
            min-height: 200px;
        }
        .message {
            margin-bottom: 8px;
            padding: 6px 10px;
            border-radius: 16px;
            background: var(--input-bg);
        }
        .message strong { color: var(--btn-primary); }
        #chatInput {
            width: calc(100% - 70px);
            display: inline-block;
            margin-right: 8px;
        }
    </style>
</head>
<body class="light">
    <div class="theme-toggle" id="themeToggle">☀️ Светлая тема</div>
    <div class="container" id="app">
        <!-- Блок для неавторизованных -->
        <div id="authBlock" class="card">
            <h1>📋 Доска заявок</h1>
            <h2>Вход / Регистрация</h2>
            <input type="email" id="email" placeholder="Email">
            <input type="password" id="password" placeholder="Пароль">
            <select id="role">
                <option value="candidate">👤 Кандидат</option>
                <option value="employer">🏢 Работодатель</option>
            </select>
            <input type="text" id="city" placeholder="Город (например, Москва)">
            <input type="tel" id="phone" placeholder="Телефон (например, +7 123 456-78-90)">
            <div>
                <button onclick="register()">Регистрация</button>
                <button onclick="login()">Вход</button>
            </div>
            <div id="authError" class="error"></div>
        </div>

        <!-- Блок для авторизованных -->
        <div id="mainApp" style="display: none;">
            <!-- Краткая карточка пользователя (можно скрыть, но оставим для информации) -->
            <div class="card" style="margin-bottom: 10px;">
                <p>✅ Вы вошли как <strong id="userRoleDisplay"></strong> (город: <span id="userCityDisplay"></span>)</p>
                <button onclick="logout()" style="background: #6b7280;">Выйти</button>
                <hr>
            </div>

            <!-- Лента -->
            <div id="feedView">
                <div class="card">
                    <h2>📢 Лента заявок</h2>
                    <div class="filter-bar">
                        <select id="cityFilter">
                            <option value="all">Все города</option>
                        </select>
                    </div>
                    <div id="jobsList"></div>
                </div>
            </div>

            <!-- Мои заявки -->
            <div id="myJobsView" style="display: none;">
                <div class="card">
                    <h2>📝 Мои заявки</h2>
                    <div id="myJobsList"></div>
                </div>
            </div>

            <!-- Мои отклики -->
            <div id="myResponsesView" style="display: none;">
                <div class="card">
                    <h2>💬 Мои отклики</h2>
                    <div id="myResponsesList"></div>
                </div>
            </div>

            <!-- Общий чат исполнителей -->
            <div id="executorChatView" style="display: none;">
                <div class="card">
                    <h2>👥 Общий чат исполнителей</h2>
                    <div id="executorChatMessages" style="height: 300px; overflow-y: auto; border: 1px solid var(--border); border-radius: 16px; padding: 10px; margin-bottom: 10px;"></div>
                    <input type="text" id="executorChatInput" placeholder="Сообщение для всех исполнителей...">
                    <button id="sendExecutorChatBtn">📤 Отправить</button>
                </div>
            </div>

            <!-- Профиль -->
            <div id="profileView" style="display: none;">
    <div class="card">
        <h2>👤 Профиль</h2>
        <div id="profileDisplay">
            <p><strong>Имя:</strong> <span id="profileName"></span> <button id="editProfileBtn">✏️ Редактировать</button></p>
            <p><strong>Email:</strong> <span id="profileEmail"></span></p>
            <p><strong>Роль:</strong> <span id="profileRole"></span></p>
            <p><strong>Телефон:</strong> <span id="profilePhone"></span></p>
            <p><strong>Город:</strong> <span id="profileCity"></span></p>
            <button id="logoutBtnFromProfile">Выйти</button>
        </div>
        <div id="profileEditForm" style="display: none;">
            <input type="text" id="editName" placeholder="Имя">
            <input type="tel" id="editPhone" placeholder="Телефон">
            <input type="text" id="editCity" placeholder="Город">
            <button id="saveProfileBtn">💾 Сохранить</button>
            <button id="cancelEditBtn">Отмена</button>
        </div>
    </div>
</div>

            <!-- Форма создания заявки -->
            <div id="createJobForm" class="card" style="display: none;">
                <h3>➕ Новая заявка</h3>
                <input type="text" id="jobTitle" placeholder="Название услуги">
                <textarea id="jobDesc" rows="3" placeholder="Описание"></textarea>
                <select id="jobCategory">
                    <option value="repair">🔧 Ремонт</option>
                    <option value="cleaning">🧹 Уборка</option>
                    <option value="delivery">🚚 Доставка</option>
                    <option value="it">💻 IT-помощь</option>
                    <option value="other">📦 Другое</option>
                </select>
                <input type="text" id="jobCity" placeholder="Город выполнения">
                <input type="number" id="jobPrice" placeholder="Цена (руб)" min="0" step="1">
                <button onclick="createJob()">Опубликовать</button>
            </div>
        </div>
    </div>

    <!-- Нижнее меню (Авито-стайл) -->
    <div class="bottom-nav" id="bottomNav" style="display: none;">
        <button class="nav-item" data-view="feed"><span>📰</span><span>Лента</span></button>
        <button class="nav-item" data-view="myJobs" id="myJobsNavBtn"><span>📋</span><span>Мои заявки</span></button>
        <button class="nav-item" data-view="myResponses" id="myResponsesNavBtn"><span>💬</span><span>Отклики</span></button>
        <button class="nav-item" data-view="executorChat"><span>💬</span><span>Чат исполнителей</span></button>
        <button class="nav-item" data-view="profile"><span>👤</span><span>Профиль</span></button>
    </div>

    <!-- Модальное окно чата по заявке -->
    <div id="chatModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeChat()">&times;</span>
            <h3>💬 Чат по заявке</h3>
            <div id="chatMessages"></div>
            <input type="text" id="chatInput" placeholder="Введите сообщение...">
            <div style="display: flex; gap: 8px; margin-top: 8px;">
                <button id="sendMessageBtn" style="flex: 2;">📤 Отправить</button>
                <button onclick="closeChat()" style="flex: 1; background: #6b7280;">✖ Закрыть</button>
            </div>
        </div>
    </div>

    <button id="installButton" style="padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; display: none;">📱 Установить приложение</button>

    <script>
        // ========== ТЕМА ==========
        const themeToggle = document.getElementById('themeToggle');
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark') {
            document.body.classList.remove('light');
            document.body.classList.add('dark');
            themeToggle.innerHTML = '🌙 Тёмная тема';
        } else {
            themeToggle.innerHTML = '☀️ Светлая тема';
        }
        themeToggle.addEventListener('click', () => {
            if (document.body.classList.contains('light')) {
                document.body.classList.remove('light');
                document.body.classList.add('dark');
                localStorage.setItem('theme', 'dark');
                themeToggle.innerHTML = '🌙 Тёмная тема';
            } else {
                document.body.classList.remove('dark');
                document.body.classList.add('light');
                localStorage.setItem('theme', 'light');
                themeToggle.innerHTML = '☀️ Светлая тема';
            }
        });

        let token = localStorage.getItem('token');
        let user = null;

        const authBlock = document.getElementById('authBlock');
        const mainApp = document.getElementById('mainApp');
        const bottomNav = document.getElementById('bottomNav');
        const feedView = document.getElementById('feedView');
        const myJobsView = document.getElementById('myJobsView');
        const myResponsesView = document.getElementById('myResponsesView');
        const createJobForm = document.getElementById('createJobForm');

        function updateUIForRole() {
            if (!user) return;
            const isCandidate = (user.role === 'candidate');
            const isEmployerOrAdmin = (user.role === 'employer' || user.role === 'admin');
            createJobForm.style.display = isEmployerOrAdmin ? 'block' : 'none';
            const myJobsBtn = document.getElementById('myJobsNavBtn');
            const myResponsesBtn = document.getElementById('myResponsesNavBtn');
            if (isCandidate) {
                myJobsBtn.style.display = 'none';
                myResponsesBtn.style.display = 'flex';
                if (myJobsView.style.display !== 'none') switchView('feed');
            } else {
                myJobsBtn.style.display = 'flex';
                myResponsesBtn.style.display = 'none';
                if (myResponsesView.style.display !== 'none') switchView('feed');
            }
            document.getElementById('userRoleDisplay').innerText = isCandidate ? 'Кандидат' : (user.role === 'employer' ? 'Работодатель' : 'Администратор');
            document.getElementById('userCityDisplay').innerText = user.city || 'не указан';
        }

        async function loadCityFilter() {
    const res = await fetch('/api/jobs?city=all');
    const jobs = await res.json();
    let cities = [...new Set(jobs.map(j => j.city).filter(c => c))];
    // Переносим город пользователя в начало списка
    if (user && user.city && cities.includes(user.city)) {
        cities = [user.city, ...cities.filter(c => c !== user.city)];
    }
    const select = document.getElementById('cityFilter');
    select.innerHTML = '<option value="all">Все города</option>';
    cities.forEach(city => {
        const opt = document.createElement('option');
        opt.value = city;
        opt.textContent = city;
        if (user && user.city === city) opt.selected = true;
        select.appendChild(opt);
    });
    select.onchange = () => loadJobs();
}
        async function loadJobs() {
            const cityFilter = document.getElementById('cityFilter').value;
            let url = '/api/jobs';
            if (cityFilter && cityFilter !== 'all') url += `?city=${encodeURIComponent(cityFilter)}`;
            const res = await fetch(url);
            const jobs = await res.json();
            const container = document.getElementById('jobsList');
            container.innerHTML = '';
            if (jobs.length === 0) { container.innerHTML = '<p>Нет заявок</p>'; return; }
            for (let job of jobs) {
                const div = document.createElement('div');
                div.className = 'job';
                const categoryNames = { repair: '🔧 Ремонт', cleaning: '🧹 Уборка', delivery: '🚚 Доставка', it: '💻 IT', other: '📦 Другое' };
                const categoryText = categoryNames[job.category] || job.category;
                div.innerHTML = `
                    <strong>${escapeHtml(job.title)}</strong>
                    <div class="job-meta">
                        <span>📂 ${categoryText}</span>
                        <span>📍 ${job.city || 'Не указан'}</span>
                        <span>📅 ${new Date(job.createdAt).toLocaleString()}</span>
                        <span>🏷️ Статус: ${job.status || 'open'}</span>
                    </div>
                    <p>${escapeHtml(job.description)}</p>
                `;
                const priceDiv = document.createElement('div');
                priceDiv.className = 'job-meta';
                priceDiv.innerHTML = `💰 Цена: ${job.price || 0} руб. | Оплата: ${job.paymentStatus === 'pending' ? '⏳ Ожидает' : (job.paymentStatus === 'paid' ? '✅ Оплачено' : '💸 Выплачено')}`;
                div.appendChild(priceDiv);
                
                if (user && user.role === 'candidate' && (job.status === 'open' || !job.status)) {
                    const respondBtn = document.createElement('button');
                    respondBtn.innerText = '📞 Откликнуться';
                    respondBtn.onclick = () => respondToJob(job.id);
                    div.appendChild(respondBtn);
                }
                if (user && user.id === job.employerId && job.paymentStatus === 'pending' && job.price > 0) {
                    const payBtn = document.createElement('button');
                    payBtn.innerText = '💳 Оплатить (симуляция)';
                    payBtn.style.background = 'var(--btn-success)';
                    payBtn.onclick = () => simulatePayment(job.id);
                    div.appendChild(payBtn);
                }
                if (job.status === 'taken' && user && (user.id === job.employerId || user.id === job.assignedTo)) {
                    const chatBtn = document.createElement('button');
                    chatBtn.innerText = '💬 Чат';
                    chatBtn.onclick = () => openChat(job.id);
                    div.appendChild(chatBtn);
                }
                // Кнопка удаления: только для своих заявок (работодатель) или админ
                if (user && (user.role === 'admin' || (user.role === 'employer' && job.employerId === user.id))) {
                    const deleteBtn = document.createElement('button');
                    deleteBtn.innerText = '❌ Удалить';
                    deleteBtn.classList.add('danger-btn');
                    deleteBtn.onclick = () => deleteJob(job.id);
                    div.appendChild(deleteBtn);
                }
                container.appendChild(div);
            }
        }

        async function respondToJob(jobId) {
            if (await checkIfBanned()) return;
            try {
                const res = await fetch('/api/responses', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ jobId })
                });
                const data = await res.json();
                if (res.ok) {
                    if (data.autoAssigned) {
                        showNotification('✅ ' + (data.message || 'Вы первый откликнулись! Заявка ваша.'), 'success');
                    } else {
                        showNotification('📝 ' + (data.message || 'Отклик отправлен, заявка уже в работе.'), 'info');
                    }
                    loadJobs();
                    if (user.role === 'candidate') loadMyResponses();
                    if (myJobsView.style.display !== 'none') loadMyJobs();
                } else {
                    showNotification(data.error || 'Ошибка при отклике', 'error');
                }
            } catch (err) {
                showNotification('Ошибка сети: ' + err.message, 'error');
            }
        }

        async function simulatePayment(jobId) {
            const res = await fetch(`/api/pay/${jobId}`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const data = await res.json();
            if (res.ok) {
                showNotification(data.message, 'success');
                loadJobs();
                if (window.loadMyJobs) loadMyJobs();
            } else {
                showNotification(data.error || 'Ошибка оплаты', 'error');
            }
        }

        async function assignJob(jobId, candidateId) {
            const res = await fetch(`/api/jobs/${jobId}/assign`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ candidateId })
            });
            if (res.ok) {
                showNotification('Исполнитель назначен, заявка закрыта для новых откликов', 'success');
                loadMyJobs();
                loadJobs();
            } else {
                const err = await res.json();
                showNotification(err.error, 'error');
            }
        }

        async function deleteJob(jobId) {
            if (!confirm('Удалить заявку?')) return;
            const res = await fetch(`/api/jobs/${jobId}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) {
                loadJobs();
                if (myJobsView.style.display !== 'none') loadMyJobs();
            } else alert('Ошибка');
        }

        async function loadMyJobs() {
            const res = await fetch('/api/my-jobs', { headers: { 'Authorization': `Bearer ${token}` } });
            const jobs = await res.json();
            const container = document.getElementById('myJobsList');
            container.innerHTML = '';
            if (jobs.length === 0) { container.innerHTML = '<p>Вы ещё не создали заявок</p>'; return; }
            for (let job of jobs) {
                const jobDiv = document.createElement('div');
                jobDiv.className = 'job';
                jobDiv.innerHTML = `
                    <strong>${escapeHtml(job.title)}</strong><br>
                    ${escapeHtml(job.description)}<br>
                    <small>📍 ${job.city || 'Город не указан'} | Статус: ${job.status === 'open' ? '🔓 Открыта' : (job.status === 'taken' ? '🔨 В работе' : '✅ Завершена')}</small>
                `;
                if (job.status === 'taken' && user && (user.id === job.employerId || user.id === job.assignedTo)) {
                    const chatBtn = document.createElement('button');
                    chatBtn.innerText = '💬 Чат';
                    chatBtn.onclick = () => openChat(job.id);
                    jobDiv.appendChild(chatBtn);
                }
                const responsesRes = await fetch(`/api/responses/by-job/${job.id}`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (responsesRes.ok) {
                    const responses = await responsesRes.json();
                    if (responses.length > 0) {
                        const responsesDiv = document.createElement('div');
                        responsesDiv.style.marginTop = '12px';
                        responsesDiv.style.padding = '8px';
                        responsesDiv.style.borderTop = '1px solid var(--border)';
                        responsesDiv.innerHTML = '<strong>📞 Отклики:</strong><br>';
                        for (let r of responses) {
                            responsesDiv.innerHTML += `
                                <div style="margin: 6px 0; display: flex; justify-content: space-between; align-items: center;">
                                    <span>👤 ${escapeHtml(r.candidateEmail)} (${new Date(r.createdAt).toLocaleString()})</span>
                                    ${job.status === 'open' ? `<button onclick="assignJob(${job.id}, ${r.candidateId})">Назначить</button>` : ''}
                                </div>
                            `;
                        }
                        jobDiv.appendChild(responsesDiv);
                    } else {
                        const noResponses = document.createElement('div');
                        noResponses.style.marginTop = '12px';
                        noResponses.style.fontSize = '0.8rem';
                        noResponses.innerText = 'Пока нет откликов';
                        jobDiv.appendChild(noResponses);
                    }
                }
                container.appendChild(jobDiv);
            }
        }

        async function loadMyResponses() {
            const res = await fetch('/api/my-responses', { headers: { 'Authorization': `Bearer ${token}` } });
            const responses = await res.json();
            const container = document.getElementById('myResponsesList');
            container.innerHTML = '';
            if (responses.length === 0) { container.innerHTML = '<p>Вы ещё не откликались</p>'; return; }
            for (let r of responses) {
                const div = document.createElement('div');
                div.className = 'job';
                div.innerHTML = `
                    <strong>${escapeHtml(r.jobTitle)}</strong><br>
                    ${escapeHtml(r.description)}<br>
                    <small>📍 ${r.city || ''}</small><br>
                    <span>📅 ${new Date(r.createdAt).toLocaleString()}</span>
                    <br><span>Статус заявки: ${r.status === 'open' ? '🔓 Открыта' : (r.status === 'taken' ? '🔨 В работе' : '✅ Завершена')}</span>
                `;
                if (r.status === 'taken' && user && (user.id === r.employerId || user.id === r.assignedTo)) {
                    const chatBtn = document.createElement('button');
                    chatBtn.innerText = '💬 Чат';
                    chatBtn.onclick = () => openChat(r.jobId);
                    div.appendChild(chatBtn);
                }
                container.appendChild(div);
            }
        }

        async function createJob() {
            if (await checkIfBanned()) return;
            const title = document.getElementById('jobTitle').value.trim();
            const description = document.getElementById('jobDesc').value.trim();
            const category = document.getElementById('jobCategory').value;
            const city = document.getElementById('jobCity').value.trim();
            const price = document.getElementById('jobPrice').value;
            if (!title || !description) { alert('Заполните название и описание'); return; }
            const res = await fetch('/api/jobs', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ title, description, category, city, price })
            });
            if (res.ok) {
                alert('Заявка создана');
                document.getElementById('jobTitle').value = '';
                document.getElementById('jobDesc').value = '';
                document.getElementById('jobCity').value = '';
                document.getElementById('jobPrice').value = '';
                loadJobs();
                if (myJobsView.style.display !== 'none') loadMyJobs();
                switchView('feed');
            } else alert('Ошибка');
        }

        function switchView(view) {
            feedView.style.display = 'none';
            myJobsView.style.display = 'none';
            myResponsesView.style.display = 'none';
            const executorChatView = document.getElementById('executorChatView');
            const profileViewElem = document.getElementById('profileView');
            if (executorChatView) executorChatView.style.display = 'none';
            if (profileViewElem) profileViewElem.style.display = 'none';
            if (view === 'feed') feedView.style.display = 'block';
            if (view === 'myJobs') { myJobsView.style.display = 'block'; loadMyJobs(); }
            if (view === 'myResponses') { myResponsesView.style.display = 'block'; loadMyResponses(); }
            if (view === 'executorChat' && executorChatView) executorChatView.style.display = 'block';
            if (view === 'profile' && profileViewElem) profileViewElem.style.display = 'block';
            document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
            const activeBtn = document.querySelector(`.nav-item[data-view="${view}"]`);
            if (activeBtn) activeBtn.classList.add('active');
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        async function register() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            const city = document.getElementById('city').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const res = await fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, role, city, phone })
            });
            if (res.ok) showAuthError('✅ Регистрация успешна, войдите');
            else { const err = await res.json(); showAuthError(err.error); }
        }

        async function login() {
            if (await checkIfBanned()) return;
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            if (res.ok) {
                const data = await res.json();
                token = data.token;
                user = data.user;
                localStorage.setItem('token', token);
                authBlock.style.display = 'none';
                mainApp.style.display = 'block';
                bottomNav.style.display = 'flex';
                updateUIForRole();
                loadCityFilter();
                loadJobs();
                switchView('feed');
                // Заполнение профиля
                if (document.getElementById('profileEmail')) {
                    document.getElementById('profileEmail').innerText = user.email;
                    document.getElementById('profileRole').innerText = (user.role === 'candidate' ? 'Кандидат' : (user.role === 'employer' ? 'Работодатель' : 'Админ'));
                    document.getElementById('profileCity').innerText = user.city || 'не указан';
                    document.getElementById('profilePhone').innerText = user.phone || 'не указан';
                    document.getElementById('profileName').innerText = user.name || '—';
                }
                if (user.role === 'admin') {
                    const adminLink = document.createElement('div');
                    adminLink.innerHTML = '<hr><a href="/admin" target="_blank" style="color: var(--btn-primary);">🛠️ Админ-панель</a>';
                    document.querySelector('#feedView .card').appendChild(adminLink);
                }
            } else {
                const err = await res.json();
                showAuthError(err.error);
            }
        }

        function showAuthError(msg) {
            const errDiv = document.getElementById('authError');
            errDiv.innerText = msg;
            setTimeout(() => errDiv.innerText = '', 3000);
        }

        function logout() {
            localStorage.removeItem('token');
            token = null;
            user = null;
            authBlock.style.display = 'block';
            mainApp.style.display = 'none';
            bottomNav.style.display = 'none';
        }

        // Восстановление сессии
        if (token) {
            fetch('/api/me', { headers: { 'Authorization': `Bearer ${token}` } })
                .then(res => res.ok ? res.json() : Promise.reject())
                .then(userData => {
                    user = userData;
                    if (document.getElementById('profileEmail')) {
                        document.getElementById('profileEmail').innerText = user.email;
                        document.getElementById('profileRole').innerText = (user.role === 'candidate' ? 'Кандидат' : (user.role === 'employer' ? 'Работодатель' : 'Админ'));
                        document.getElementById('profileCity').innerText = user.city || 'не указан';
                        document.getElementById('profilePhone').innerText = user.phone || 'не указан';
                        document.getElementById('profileName').innerText = user.name || '—';
                    }
                    authBlock.style.display = 'none';
                    mainApp.style.display = 'block';
                    bottomNav.style.display = 'flex';
                    updateUIForRole();
                    loadCityFilter();
                    loadJobs();
                    switchView('feed');
                })
                .catch(() => {
                    localStorage.removeItem('token');
                    location.reload();
                });
        } else {
            authBlock.style.display = 'block';
            mainApp.style.display = 'none';
            bottomNav.style.display = 'none';
        }

        // ========== ЧАТ ПО ЗАЯВКЕ ==========
        let currentChatJobId = null;
        let chatInterval = null;

        async function openChat(jobId) {
            currentChatJobId = jobId;
            const modal = document.getElementById('chatModal');
            modal.style.display = 'block';
            await loadChatMessages();
            if (chatInterval) clearInterval(chatInterval);
            chatInterval = setInterval(loadChatMessages, 3000);
            const sendBtn = document.getElementById('sendMessageBtn');
            if (sendBtn) {
                sendBtn.replaceWith(sendBtn.cloneNode(true));
                const newBtn = document.getElementById('sendMessageBtn');
                newBtn.onclick = () => sendChatMessage();
            }
            const input = document.getElementById('chatInput');
            if (input) {
                input.onkeypress = (e) => {
                    if (e.key === 'Enter') sendChatMessage();
                };
            }
        }

        function closeChat() {
            const modal = document.getElementById('chatModal');
            if (modal) modal.style.display = 'none';
            if (chatInterval) clearInterval(chatInterval);
            currentChatJobId = null;
        }

        async function loadChatMessages() {
            if (!currentChatJobId) return;
            try {
                const res = await fetch(`/api/messages/${currentChatJobId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('Ошибка загрузки');
                const messages = await res.json();
                const container = document.getElementById('chatMessages');
                container.innerHTML = '';
                for (let msg of messages) {
                    const div = document.createElement('div');
                    div.className = 'message';
                    const senderName = (msg.senderId === user.id) ? 'Вы' : 'Собеседник';
                    div.innerHTML = `<strong>${senderName}:</strong> ${escapeHtml(msg.message)}<br><small>${new Date(msg.createdAt).toLocaleString()}</small>`;
                    container.appendChild(div);
                }
                container.scrollTop = container.scrollHeight;
            } catch (err) {
                console.error(err);
            }
        }

        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (!message || !currentChatJobId) return;
            try {
                const res = await fetch('/api/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ jobId: currentChatJobId, message })
                });
                if (res.ok) {
                    input.value = '';
                    await loadChatMessages();
                } else {
                    const errData = await res.json();
                    showNotification(errData.error || 'Ошибка отправки', 'error');
                }
            } catch (err) {
                showNotification('Ошибка сети', 'error');
            }
        }

        // ========== ОБЩИЙ ЧАТ ИСПОЛНИТЕЛЕЙ ==========
        let executorChatInterval = null;

        async function loadExecutorChatMessages() {
            try {
                const res = await fetch('/api/general-chat/messages', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (!res.ok) throw new Error('Ошибка загрузки');
                const messages = await res.json();
                const container = document.getElementById('executorChatMessages');
                if (!container) return;
                container.innerHTML = '';
                for (let msg of messages) {
                    const div = document.createElement('div');
                    div.className = 'message';
                    div.innerHTML = `<strong>Пользователь ${msg.userId}:</strong> ${escapeHtml(msg.message)}<br><small>${new Date(msg.createdAt).toLocaleString()}</small>`;
                    container.appendChild(div);
                }
                container.scrollTop = container.scrollHeight;
            } catch (err) {
                console.error(err);
            }
        }

        async function sendExecutorChatMessage() {
            const input = document.getElementById('executorChatInput');
            const message = input.value.trim();
            if (!message) return;
            try {
                const res = await fetch('/api/general-chat/messages', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ message })
                });
                if (res.ok) {
                    input.value = '';
                    await loadExecutorChatMessages();
                } else {
                    const err = await res.json();
                    showNotification(err.error || 'Ошибка отправки', 'error');
                }
            } catch (err) {
                showNotification('Ошибка сети', 'error');
            }
        }

        function startExecutorChatPolling() {
            if (executorChatInterval) clearInterval(executorChatInterval);
            loadExecutorChatMessages();
            executorChatInterval = setInterval(loadExecutorChatMessages, 3000);
        }

        function stopExecutorChatPolling() {
            if (executorChatInterval) {
                clearInterval(executorChatInterval);
                executorChatInterval = null;
            }
        }

        // Модифицируем switchView для управления опросом чата исполнителей
        const originalSwitchView = switchView;
        window.switchView = function(view) {
            if (view !== 'executorChat') stopExecutorChatPolling();
            originalSwitchView(view);
            if (view === 'executorChat') startExecutorChatPolling();
        };
        switchView = window.switchView;

        async function checkIfBanned() {
            if (!user) return false;
            try {
                const res = await fetch('/api/blacklist', { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) {
                    const blacklist = await res.json();
                    const isBanned = blacklist.some(b => b.userId === user.id);
                    if (isBanned) {
                        showNotification('⚠️ Вы забанены администратором. Вы не можете создавать заявки или откликаться.', 'error');
                        const createForm = document.getElementById('createJobForm');
                        if (createForm) createForm.style.display = 'none';
                        return true;
                    }
                }
                return false;
            } catch (err) {
                return false;
            }
        }

        function showNotification(msg, type) {
            const notif = document.createElement('div');
            notif.style.position = 'fixed';
            notif.style.bottom = '80px';
            notif.style.left = '20px';
            notif.style.right = '20px';
            notif.style.backgroundColor = type === 'success' ? '#10b981' : '#ef4444';
            notif.style.color = 'white';
            notif.style.padding = '12px';
            notif.style.borderRadius = '20px';
            notif.style.textAlign = 'center';
            notif.style.zIndex = '1000';
            notif.innerText = msg;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }

        // Инициализация обработчиков нижнего меню (кликабельность)
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => {
                const view = btn.getAttribute('data-view');
                if (view) switchView(view);
            });
        });

        window.register = register;
        window.login = login;
        window.logout = logout;
        window.createJob = createJob;
        window.respondToJob = respondToJob;
        window.assignJob = assignJob;
        window.deleteJob = deleteJob;
        window.openChat = openChat;
        window.closeChat = closeChat;
        window.simulatePayment = simulatePayment;

        document.getElementById('closeChat')?.addEventListener('click', closeChat);
        document.getElementById('sendMessageBtn')?.addEventListener('click', sendChatMessage);
        document.getElementById('logoutBtnFromProfile')?.addEventListener('click', () => logout());
        document.getElementById('sendExecutorChatBtn')?.addEventListener('click', sendExecutorChatMessage);
        document.getElementById('executorChatInput')?.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendExecutorChatMessage();
        });
        // Редактирование профиля
const editBtn = document.getElementById('editProfileBtn');
const saveBtn = document.getElementById('saveProfileBtn');
const cancelBtn = document.getElementById('cancelEditBtn');
const displayDiv = document.getElementById('profileDisplay');
const editDiv = document.getElementById('profileEditForm');

editBtn?.addEventListener('click', () => {
    document.getElementById('editName').value = document.getElementById('profileName').innerText;
    document.getElementById('editPhone').value = document.getElementById('profilePhone').innerText;
    document.getElementById('editCity').value = document.getElementById('profileCity').innerText;
    displayDiv.style.display = 'none';
    editDiv.style.display = 'block';
});

cancelBtn?.addEventListener('click', () => {
    displayDiv.style.display = 'block';
    editDiv.style.display = 'none';
});

saveBtn?.addEventListener('click', async () => {
    const name = document.getElementById('editName').value.trim();
    const phone = document.getElementById('editPhone').value.trim();
    const city = document.getElementById('editCity').value.trim();
    try {
        const res = await fetch('/api/users/profile', {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
            body: JSON.stringify({ name, phone, city })
        });
        if (res.ok) {
            const data = await res.json();
            // Обновляем отображение
            document.getElementById('profileName').innerText = name || '—';
            document.getElementById('profilePhone').innerText = phone || '—';
            document.getElementById('profileCity').innerText = city || '—';
            // Обновляем глобальный объект user
            user.name = name;
            user.phone = phone;
            user.city = city;
            // Обновляем краткую карточку
            document.getElementById('userCityDisplay').innerText = city || 'не указан';
            showNotification('✅ Профиль обновлён', 'success');
            displayDiv.style.display = 'block';
            editDiv.style.display = 'none';
        } else {
            const err = await res.json();
            showNotification(err.error || 'Ошибка обновления', 'error');
        }
    } catch (err) {
        showNotification('Ошибка сети', 'error');
    }
});

        window.onclick = function(event) {
            const modal = document.getElementById('chatModal');
            if (event.target === modal) closeChat();
        };
        document.addEventListener('keydown', function(event) {
            if (event.key === 'Escape' && document.getElementById('chatModal')?.style.display === 'block') {
                closeChat();
            }
        });

        // PWA установка
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installButton').style.display = 'inline-block';
        });
        document.getElementById('installButton').addEventListener('click', () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                deferredPrompt.userChoice.then((choiceResult) => {
                    if (choiceResult.outcome === 'accepted') {
                        console.log('Пользователь установил приложение');
                    }
                    deferredPrompt = null;
                });
            }
        });
        window.addEventListener('appinstalled', () => {
            document.getElementById('installButton').style.display = 'none';
        });

        // Автообновление PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js').then(reg => {
                reg.addEventListener('updatefound', () => {
                    const newWorker = reg.installing;
                    newWorker.addEventListener('statechange', () => {
                        if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                            const updateConfirm = confirm('✅ Доступна новая версия приложения.\nОбновить сейчас?');
                            if (updateConfirm) {
                                newWorker.postMessage({ action: 'skipWaiting' });
                                window.location.reload();
                            }
                        }
                    });
                });
            });
        }
    </script>
</body>
