<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель</title>
    <link rel="icon" type="image/png" href="/icon-192.png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.2s; }
        body { font-family: system-ui; background: var(--bg-body); color: var(--text-primary); padding: 20px; }
        :root { --bg-body: #f3f4f6; --bg-card: #fff; --text-primary: #111; --border: #e5e7eb; --btn-primary: #3b82f6; --btn-danger: #ef4444; }
        body.dark { --bg-body: #1f2937; --bg-card: #374151; --text-primary: #f9fafb; --border: #4b5563; }
        .card { background: var(--bg-card); border-radius: 24px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
        .theme-toggle { position: fixed; top: 20px; right: 20px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 40px; padding: 8px 12px; cursor: pointer; }
        button { background: var(--btn-primary); color: white; border: none; padding: 6px 12px; border-radius: 40px; cursor: pointer; margin: 2px; }
        .ban-btn { background: var(--btn-danger); }
    </style>
</head>
<body class="light">
    <div class="theme-toggle" id="themeToggle">🌙 Тема</div>
    <div class="card">
        <h1>Админ-панель</h1>
        <h2>Пользователи</h2>
        <table id="usersTable"><thead><tr><th>ID</th><th>Email</th><th>Роль</th><th>Город</th><th>Действие</th></tr></thead><tbody></tbody></table>
        <h2>Чёрный список</h2>
        <table id="blacklistTable"><thead><tr><th>ID пользователя</th><th>Email</th><th>Причина</th><th>Дата бана</th><th>Действие</th></tr></thead><tbody></tbody></table>
    </div>
    <script>
        const themeToggle = document.getElementById('themeToggle');
        if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark'); themeToggle.innerText = '☀️ Тема'; }
        themeToggle.onclick = () => {
            document.body.classList.toggle('dark');
            localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
            themeToggle.innerText = document.body.classList.contains('dark') ? '☀️ Тема' : '🌙 Тема';
        };
        const token = localStorage.getItem('token');
        if (!token) { alert('Нет доступа'); location.href = '/'; }

        async function loadUsers() {
            const res = await fetch('/api/users', { headers: { 'Authorization': `Bearer ${token}` } });
            const users = await res.json();
            const blacklistRes = await fetch('/api/blacklist', { headers: { 'Authorization': `Bearer ${token}` } });
            const blacklist = await blacklistRes.json();
            const bannedIds = blacklist.map(b => b.userId);
            const tbody = document.querySelector('#usersTable tbody');
            tbody.innerHTML = '';
            for (let u of users) {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = u.id;
                row.insertCell(1).innerText = u.email;
                const roleCell = row.insertCell(2);
                const select = document.createElement('select');
                ['candidate','employer','admin'].forEach(r => {
                    const opt = document.createElement('option');
                    opt.value = r;
                    opt.innerText = r;
                    if (u.role === r) opt.selected = true;
                    select.appendChild(opt);
                });
                select.onchange = () => updateRole(u.id, select.value);
                roleCell.appendChild(select);
                row.insertCell(3).innerText = u.city || '-';
                const actionCell = row.insertCell(4);
                if (bannedIds.includes(u.id)) {
                    const unbanBtn = document.createElement('button');
                    unbanBtn.innerText = 'Разбанить';
                    unbanBtn.onclick = () => unbanUser(u.id);
                    actionCell.appendChild(unbanBtn);
                } else {
                    const banBtn = document.createElement('button');
                    banBtn.innerText = 'Забанить';
                    banBtn.classList.add('ban-btn');
                    banBtn.onclick = () => banUser(u.id);
                    actionCell.appendChild(banBtn);
                }
            }
        }

        async function updateRole(userId, newRole) {
            await fetch(`/api/users/${userId}/role`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ role: newRole }) });
            alert('Роль обновлена');
        }

        async function banUser(userId) {
            const reason = prompt('Причина бана:');
            if (!reason) return;
            const res = await fetch('/api/blacklist', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }, body: JSON.stringify({ userId, reason }) });
            if (res.ok) { alert('Пользователь забанен'); loadUsers(); loadBlacklist(); }
            else alert('Ошибка');
        }

        async function unbanUser(userId) {
            const res = await fetch(`/api/blacklist/${userId}`, { method: 'DELETE', headers: { 'Authorization': `Bearer ${token}` } });
            if (res.ok) { alert('Пользователь разбанен'); loadUsers(); loadBlacklist(); }
            else alert('Ошибка');
        }

        async function loadBlacklist() {
            const res = await fetch('/api/blacklist', { headers: { 'Authorization': `Bearer ${token}` } });
            const blacklist = await res.json();
            const tbody = document.querySelector('#blacklistTable tbody');
            tbody.innerHTML = '';
            for (let b of blacklist) {
                const row = tbody.insertRow();
                row.insertCell(0).innerText = b.userId;
                row.insertCell(1).innerText = b.email;
                row.insertCell(2).innerText = b.reason;
                row.insertCell(3).innerText = new Date(b.bannedAt).toLocaleString();
                const actionCell = row.insertCell(4);
                const unbanBtn = document.createElement('button');
                unbanBtn.innerText = 'Разбанить';
                unbanBtn.onclick = () => unbanUser(b.userId);
                actionCell.appendChild(unbanBtn);
            }
        }

        loadUsers();
        loadBlacklist();
    </script>
</body>
</html>
